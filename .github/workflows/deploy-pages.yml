name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish MahjongScorer.csproj -c Release -o publish

      - name: Fix base path for GitHub Pages
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          # Fix base href in index.html
          sed -i "s|<base href=\"/\" />|<base href=\"/${REPO_NAME}/\" />|g" publish/wwwroot/index.html
          # Fix service worker scope to match base path
          sed -i "s|const base = \"/\";|const base = \"/${REPO_NAME}/\";|g" publish/wwwroot/service-worker-assets.js 2>/dev/null || true
          sed -i "s|const base = \"/\";|const base = \"/${REPO_NAME}/\";|g" publish/wwwroot/service-worker.published.js

      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Add 404.html for SPA routing
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
